<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="720" viewBox="0 0 2400 720">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#555"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #333; }
      .title { font-size: 34px; font-weight: 700; }
      .label { font-size: 24px; }
      .small { font-size: 20px; }
      .arrow { stroke: #555; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="2400" height="720" fill="#fff"/>
  <text x="1200" y="64" text-anchor="middle" class="title">SignalDesk AWS Logical Flow</text>

  <g transform="translate(70 280)">
